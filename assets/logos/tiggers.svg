<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="49" fill="#fa6400" stroke="#0c2340" stroke-width="2"/>

  <!-- Kitten head -->
  <g>
    <!-- ears -->
    <path d="M 30 38 L 22 18 L 42 32 Z" fill="#0c2340"/>
    <path d="M 70 38 L 78 18 L 58 32 Z" fill="#0c2340"/>
    <path d="M 31 35 L 26 22 L 39 31 Z" fill="#fa6400"/>
    <path d="M 69 35 L 74 22 L 61 31 Z" fill="#fa6400"/>

    <!-- head -->
    <circle cx="50" cy="55" r="26" fill="#0c2340"/>

    <!-- face patch -->
    <ellipse cx="50" cy="60" rx="20" ry="17" fill="#f4f5f7"/>

    <!-- eyes -->
    <ellipse cx="41" cy="55" rx="3.4" ry="4.4" fill="#0c2340"/>
    <ellipse cx="59" cy="55" rx="3.4" ry="4.4" fill="#0c2340"/>
    <circle cx="42.2" cy="53.3" r="1" fill="#ffffff"/>
    <circle cx="60.2" cy="53.3" r="1" fill="#ffffff"/>

    <!-- nose -->
    <path d="M 47 63 L 53 63 L 50 67 Z" fill="#bf0d3e"/>

    <!-- mouth -->
    <path d="M 50 67 Q 50 70 46 71" stroke="#0c2340" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 50 67 Q 50 70 54 71" stroke="#0c2340" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- whiskers -->
    <line x1="20" y1="58" x2="34" y2="59" stroke="#0c2340" stroke-width="1.2"/>
    <line x1="20" y1="64" x2="34" y2="63" stroke="#0c2340" stroke-width="1.2"/>
    <line x1="80" y1="58" x2="66" y2="59" stroke="#0c2340" stroke-width="1.2"/>
    <line x1="80" y1="64" x2="66" y2="63" stroke="#0c2340" stroke-width="1.2"/>
  </g>
</svg>
