<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorebook — Tube Socks @ Tiggers | MLB Digital Scorebook Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/styles.css">
<style>
  /* Linescore sticky columns */
  .ls-team-col { position:sticky; left:0; background:inherit; z-index:2; }
  /* Tab active state */
  .tab-active   { color:#111827 !important; border-color:#111827 !important; font-weight:700; }
  /* Dead off/def cell */
  .cell-dead    { cursor:default; background:#fafafa; }
  /* Substitution stack divider */
  .sub-divider  { border-top:1px dashed #d1d5db; margin-top:4px; padding-top:4px; }
  /* Smooth section transitions */
  [data-panel]  { animation: fadeIn .15s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body class="min-h-screen bg-gray-100 flex justify-center">

  <div class="w-full max-w-md bg-white min-h-screen shadow-xl flex flex-col relative">

    <!-- ══════════ STICKY HEADER ══════════ -->
    <header class="sticky top-0 z-40 bg-white border-b border-gray-100 shadow-sm">

      <!-- Mode toggle -->
      <div class="flex border-b border-gray-100" role="tablist">
        <button id="mode-wnl" data-mode="watch-learn" role="tab" aria-selected="false"
          class="flex-1 py-3 text-sm font-semibold text-gray-400 border-b-2 border-transparent transition-all">
          Watch &amp; Learn
        </button>
        <button id="mode-tf" data-mode="true-fan" role="tab" aria-selected="false"
          class="flex-1 py-3 text-sm font-semibold text-gray-400 border-b-2 border-transparent transition-all">
          True Fan
        </button>
      </div>

      <!-- Linescore -->
      <div class="bg-gray-50 border-b border-gray-200 overflow-x-auto" id="linescore-scroll">
        <table class="text-[10px] text-center border-collapse w-full" id="linescore-table" style="table-layout:fixed; min-width:320px;">
          <colgroup>
            <col style="width:52px">
            <col><col><col><col><col><col><col><col><col>
            <col style="width:24px">
            <col style="width:22px">
            <col style="width:22px">
          </colgroup>
          <thead>
            <tr class="text-gray-400 font-semibold">
              <th class="ls-team-col bg-gray-50 text-left pl-3 py-1.5">TEAM</th>
              <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
              <th>6</th><th>7</th><th>8</th><th>9</th>
              <th class="border-l border-gray-300 text-gray-600">R</th>
              <th class="text-gray-600">H</th>
              <th class="text-gray-600">E</th>
            </tr>
          </thead>
          <tbody id="linescore-body" class="font-semibold text-gray-800"></tbody>
        </table>
      </div>

      <!-- Team tabs (hidden until mode selected) -->
      <div id="team-bar" class="hidden flex border-b border-gray-100">
        <button data-team="away"
          class="flex-1 py-2.5 text-sm font-semibold text-gray-400 flex items-center justify-center gap-2 border-b-2 border-transparent transition-all">
          <img src="../assets/logos/tubesocks.svg" alt="" class="w-5 h-5 rounded-full">Tube Socks
        </button>
        <button data-team="home"
          class="flex-1 py-2.5 text-sm font-semibold text-gray-400 flex items-center justify-center gap-2 border-b-2 border-transparent transition-all">
          <img src="../assets/logos/tiggers.svg" alt="" class="w-5 h-5 rounded-full">Tiggers
        </button>
      </div>

      <!-- Section tabs (hidden until team selected) -->
      <div id="section-bar" class="hidden flex">
        <button data-section="lineup"
          class="flex-1 py-2 text-xs font-semibold text-gray-400 border-b-2 border-transparent transition-all">Line Up</button>
        <button data-section="pitching"
          class="flex-1 py-2 text-xs font-semibold text-gray-400 border-b-2 border-transparent transition-all">Pitching</button>
        <button data-section="offense-defense"
          class="flex-1 py-2 text-xs font-semibold text-gray-400 border-b-2 border-transparent transition-all">Offence/Defense</button>
      </div>
    </header>

    <!-- ══════════ MAIN CONTENT ══════════ -->
    <main class="flex-1 overflow-y-auto pb-20" id="main-content">

      <!-- Empty state -->
      <div id="panel-empty" class="flex flex-col items-center justify-center h-full py-24 px-8 text-center">
        <svg class="w-14 h-14 text-gray-200 mb-4" viewBox="0 0 56 56" fill="none">
          <path d="M28 4 L52 28 L28 52 L4 28 Z" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <path d="M28 4 L28 52M4 28 L52 28" stroke="currentColor" stroke-width="1" stroke-dasharray="3 3" opacity=".5"/>
        </svg>
        <p class="text-sm font-medium text-gray-400" id="empty-message">Select a mode above to begin.</p>
      </div>

      <!-- ── LINEUP panel ── -->
      <section id="panel-lineup" class="hidden" data-panel>
        <!-- Injected by JS depending on mode -->
      </section>

      <!-- ── PITCHING panel ── -->
      <section id="panel-pitching" class="hidden" data-panel>
        <!-- Injected by JS depending on mode -->
      </section>

      <!-- ── OFFENCE/DEFENSE panel ── -->
      <section id="panel-offense-defense" class="hidden" data-panel>
        <!-- Injected by JS depending on mode -->
      </section>
    </main>

    <!-- ══════════ CLOCK BAR — WNL only, no pause ══════════ -->
    <div id="clock-bar" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 shadow-lg px-4 py-2.5 z-30">
      <div class="flex items-center gap-3">
        <button id="btn-reset" class="text-gray-400 text-xs shrink-0 hover:text-gray-700 transition-colors" title="Reset to start">
          ↩ Reset
        </button>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold text-gray-800 truncate" id="clock-status">Demo starts at: Top 4th – 1st Out (Tube Socks)</p>
          <p class="text-[9px] text-gray-400 leading-none mt-0.5">Watch &amp; Learn demo · not real-time</p>
        </div>
        <select id="playback-speed" class="text-xs border border-gray-200 rounded px-2 py-1 text-gray-600 bg-white shrink-0 outline-none">
          <option value="1">1x</option>
          <option value="0.67">2/3x</option>
          <option value="0.5">1/2x</option>
          <option value="0.33">1/3x</option>
        </select>
      </div>
    </div>

    <!-- ══════════ SAVE BAR — TF only ══════════ -->
    <div id="save-bar" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 px-4 py-2.5 z-30 flex justify-end">
      <button id="btn-save" class="bg-gray-900 text-white font-bold text-sm px-6 py-2 rounded-full hover:bg-gray-700 transition-colors">
        Save
      </button>
    </div>

  </div><!-- /phone card -->

  <!-- ══════════ CENTERED BALLOON MODAL ══════════ -->
  <div id="atbat-modal" class="fixed inset-0 bg-black/40 z-50 hidden items-center justify-center px-4">
    <div class="bg-white w-full max-w-xs rounded-2xl shadow-2xl overflow-hidden">
      <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b border-gray-100">
        <h3 class="font-bold text-gray-900 text-sm" id="modal-title">At-Bat</h3>
        <button id="modal-close" class="text-gray-300 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>
      <div class="px-5 py-4 max-h-[60vh] overflow-y-auto">
        <div id="modal-body" class="grid grid-cols-3 gap-2 text-sm font-semibold"></div>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/scorebook.js"></script>
</body>
</html>
