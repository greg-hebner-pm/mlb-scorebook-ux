<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorebook — Tube Socks @ Tiggers | MLB Digital Scorebook Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body class="min-h-screen bg-[var(--mlb-gray-100)]">

  <!-- ===================================================================
       PERSISTENT HEADER — always visible per spec.
       Row 1: Watch & Learn / True Fan mode toggle (yellow = active)
       Row 2: Linescore strip (placeholder, populated by scorebook.js)
       Row 3: Team hotlinks (Tube Socks / Tiggers, yellow = active)
       Row 4: Section hotlinks (Line Up / Pitching / Offence-Defense)
  =================================================================== -->
  <header class="app-header text-white shadow-lg">

    <!-- Mode toggle -->
    <div class="flex" role="tablist" aria-label="Scorebook mode">
      <button id="mode-wnl" class="flex-1 py-3 text-sm font-bold uppercase tracking-wide transition-colors is-active"
              role="tab" aria-selected="true" data-mode="watch-learn">
        Watch &amp; Learn
      </button>
      <button id="mode-tf" class="flex-1 py-3 text-sm font-bold uppercase tracking-wide transition-colors hover:bg-white/10"
              role="tab" aria-selected="false" data-mode="true-fan">
        True Fan
      </button>
    </div>

    <!-- Watch & Learn playback controls (visible only in Watch & Learn mode) -->
    <div id="playback-controls" class="flex items-center gap-3 px-4 py-2 bg-black/20 text-xs">
      <button id="playback-toggle" class="font-bold" aria-label="Play / Pause">&#9658;</button>
      <span>Speed:</span>
      <select id="playback-speed" class="bg-transparent border border-white/30 rounded px-2 py-1 text-white">
        <option value="1">1x</option>
        <option value="0.5">1/2x</option>
        <option value="0.33">1/3x</option>
        <option value="0.66">2/3x</option>
      </select>
      <span class="ml-auto" id="playback-status">Top 4th &middot; 1 Out</span>
    </div>

    <!-- Linescore strip -->
    <div class="px-2 py-2 overflow-x-auto">
      <table class="w-full text-[11px] text-center border-collapse" id="linescore-table">
        <thead class="text-white/70">
          <tr>
            <th class="text-left pl-2 font-medium">TEAM</th>
            <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th>
            <th class="pl-2">R</th><th>H</th><th>E</th><th>LOB</th>
          </tr>
        </thead>
        <tbody id="linescore-body" class="font-semibold">
          <!-- rows injected by scorebook.js -->
        </tbody>
      </table>
    </div>

    <!-- Team hotlinks -->
    <div class="flex border-t border-white/10">
      <button class="flex-1 py-2.5 text-sm font-bold is-active flex items-center justify-center gap-2" data-team="away">
        <img src="../assets/logos/tubesocks.svg" alt="" class="w-5 h-5 rounded-full">
        Tube Socks
      </button>
      <button class="flex-1 py-2.5 text-sm font-bold hover:bg-white/10 flex items-center justify-center gap-2" data-team="home">
        <img src="../assets/logos/tiggers.svg" alt="" class="w-5 h-5 rounded-full">
        Tiggers
      </button>
    </div>

    <!-- Section hotlinks -->
    <div class="flex border-t border-white/10 text-xs font-semibold">
      <button class="flex-1 py-2 is-active" data-section="lineup">Line Up</button>
      <button class="flex-1 py-2 hover:bg-white/10" data-section="pitching">Pitching</button>
      <button class="flex-1 py-2 hover:bg-white/10" data-section="offense-defense">Offence/Defense</button>
    </div>
  </header>

  <!-- ===================================================================
       MAIN CONTENT — section panels, swapped by data-section above.
       Each panel scrolls independently below the persistent header.
  =================================================================== -->
  <main class="max-w-5xl mx-auto pb-24">

    <!-- LINE UP panel -->
    <section id="panel-lineup" class="p-4" data-panel>
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-[var(--mlb-ink)]">Starting Lineup</h2>
        <button id="btn-insert-lineup" class="bg-[var(--mlb-navy)] text-white text-xs font-bold px-3 py-2 rounded">
          Insert Lineup
        </button>
      </div>
      <div id="lineup-list" class="bg-white rounded-lg shadow divide-y divide-gray-100 max-h-[60vh] overflow-y-auto">
        <!-- 9 batting-order rows injected by scorebook.js; scrollable per spec -->
      </div>
    </section>

    <!-- PITCHING panel -->
    <section id="panel-pitching" class="p-4 hidden" data-panel>
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-[var(--mlb-ink)]">Pitching</h2>
      </div>
      <div class="bg-white rounded-lg shadow overflow-x-auto">
        <table class="w-full text-xs text-center" id="pitching-table">
          <thead class="bg-gray-50 text-gray-500">
            <tr>
              <th class="text-left pl-3 py-2">PITCHER</th>
              <th>R/L</th><th>IP</th><th>P</th><th>BF</th><th>H</th><th>R</th><th>ER</th><th>BB</th><th>K</th>
            </tr>
          </thead>
          <tbody id="pitching-body"><!-- injected --></tbody>
        </table>
      </div>
    </section>

    <!-- OFFENCE / DEFENSE panel — the core scorebook grid -->
    <section id="panel-offense-defense" class="p-4" data-panel>
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-[var(--mlb-ink)]">Offence / Defense</h2>
        <span class="text-[11px] text-gray-500">Scrolls left-right for innings, up-down for lineup</span>
      </div>
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <div class="flex">
          <!-- Frozen left column: batting order / position, scrolls vertically with grid -->
          <div class="shrink-0 w-28 border-r border-gray-200">
            <div class="h-10 flex items-center text-[10px] font-bold text-gray-500 px-2 border-b border-gray-200">PLAYER / POS</div>
            <div id="player-col" class="max-h-[55vh] overflow-y-auto">
              <!-- 9 rows injected -->
            </div>
          </div>
          <!-- Scrollable at-bat grid -->
          <div class="overflow-x-auto overflow-y-auto max-h-[55vh] flex-1 scorecard-surface">
            <div id="atbat-grid" class="min-w-[900px]">
              <!-- header + 9 rows x 11 innings of clickable cells injected by scorebook.js -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ===================================================================
       True Fan "Save" button — only enabled in True Fan mode (spec)
  =================================================================== -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 flex justify-end z-30">
    <button id="btn-save" disabled
            class="bg-gray-300 text-gray-500 font-bold text-sm px-6 py-2.5 rounded-full transition-colors cursor-not-allowed">
      Save
    </button>
  </div>

  <!-- ===================================================================
       At-bat input modal — tactile entry for True Fan mode (spec: pop-ups
       rather than typing). Hidden by default; opened by scorebook.js.
  =================================================================== -->
  <div id="atbat-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-end sm:items-center justify-center">
    <div class="bg-white w-full sm:max-w-sm sm:rounded-xl rounded-t-2xl p-4 max-h-[80vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-[var(--mlb-ink)]" id="modal-title">At-Bat Result</h3>
        <button id="modal-close" class="text-gray-400 text-xl leading-none">&times;</button>
      </div>
      <div id="modal-body" class="grid grid-cols-3 gap-2 text-sm font-semibold">
        <!-- Hits / Outs / BB / E option buttons injected by scorebook.js -->
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/scorebook.js"></script>
</body>
</html>
