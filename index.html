<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tube Socks @ Tiggers — Live | MLB Digital Scorebook Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen flex flex-col items-center">

  <!--
    INTRO / SCOREBOARD SCREEN
    Static page (per spec) except for the "Scorebook" hotlink in the
    feature banner below, which routes to pages/scorebook.html.
  -->
  <main class="w-full max-w-md bg-white min-h-screen shadow-xl flex flex-col">

    <!-- Top utility bar: MLB logo intentionally removed per spec; controller icon kept -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
      <a href="#" class="text-sm font-semibold text-[var(--mlb-navy)]">Log In</a>
      <div class="flex items-center gap-4">
        <img src="assets/icons/controller.svg" alt="Game controls" class="w-6 h-6">
        <button aria-label="Menu" class="flex flex-col gap-[3px] w-5">
          <span class="block h-[2px] bg-[var(--mlb-navy)]"></span>
          <span class="block h-[2px] bg-[var(--mlb-navy)]"></span>
          <span class="block h-[2px] bg-[var(--mlb-navy)]"></span>
        </button>
      </div>
    </div>

    <!-- Field/action hero. Strike-zone grid overlay removed per feedback;
         original stadium/batter illustration used in its place. -->
    <div class="relative w-full aspect-[3/2] overflow-hidden">
      <img src="assets/hero-illustration.svg" alt="" class="w-full h-full object-cover">
    </div>

    <!-- Live game state -->
    <div class="px-4 pt-4 pb-2">
      <div class="flex items-center justify-between mb-4">
        <span class="bg-[var(--mlb-red)] text-white text-xs font-bold px-2.5 py-1 rounded tracking-wide">LIVE</span>
        <span class="text-sm text-gray-700 font-semibold" id="game-state-label">TOP 4TH &middot; 1 OUT</span>
      </div>

      <div class="flex items-center justify-between py-3 border-b border-gray-100">
        <div class="flex items-center gap-3.5">
          <img src="assets/logos/tubesocks.svg" alt="Tube Socks logo" class="w-11 h-11 rounded-full">
          <span class="font-extrabold text-xl text-[var(--mlb-ink)] tracking-tight">Tube Socks</span>
        </div>
        <span class="font-extrabold text-3xl tabular-nums text-[var(--mlb-ink)]" id="away-score">3</span>
      </div>
      <div class="flex items-center justify-between py-3">
        <div class="flex items-center gap-3.5">
          <img src="assets/logos/tiggers.svg" alt="Tiggers logo" class="w-11 h-11 rounded-full">
          <span class="font-extrabold text-xl text-[var(--mlb-ink)] tracking-tight">Tiggers</span>
        </div>
        <span class="font-extrabold text-3xl tabular-nums text-[var(--mlb-ink)]" id="home-score">2</span>
      </div>

      <p class="text-xs text-gray-500 mt-3" id="broadcast-line">DSN</p>
      <p class="text-sm text-gray-800 mt-1.5">
        <span class="text-[var(--mlb-navy)] font-semibold">P:</span> Delgado &nbsp;&nbsp;
        <span class="text-[var(--mlb-navy)] font-semibold">AB:</span> Petrov
      </p>
    </div>

    <!-- Feature banner: Watch / Audio / Gameday / Story / Scorebook -->
    <nav class="flex items-center justify-between px-4 py-3 border-y border-gray-200 text-sm font-semibold text-[var(--mlb-navy)]">
      <a href="#" class="hover:underline">Watch</a>
      <a href="#" class="hover:underline">Audio</a>
      <a href="#" class="hover:underline">Gameday</a>
      <a href="#" class="hover:underline">Story</a>
      <a href="pages/scorebook.html" class="hover:underline underline decoration-2 decoration-[var(--mlb-yellow)]">Scorebook</a>
    </nav>

    <!-- Portfolio attribution — replaces the ad placeholder entirely, per feedback -->
    <div class="mx-4 my-4 px-4 py-3.5 rounded-lg border border-gray-200 flex items-center justify-between text-xs text-gray-600">
      <div>
        <p class="font-semibold text-[var(--mlb-ink)]">Greg Hebner</p>
        <p>Senior Product Designer — MLB App, Web &amp; Streaming (Candidate Proposal)</p>
      </div>
      <a href="https://www.linkedin.com/in/greghebner/" target="_blank" rel="noopener"
         class="text-[var(--mlb-navy)] font-semibold hover:underline whitespace-nowrap ml-3">
        LinkedIn &#8599;
      </a>
    </div>

    <!-- Bottom tab bar — present in the reference, restored here -->
    <nav class="mt-auto border-t border-gray-200 flex items-center justify-around py-2.5 text-[10px] font-medium text-gray-500">
      <div class="flex flex-col items-center gap-1 text-[var(--mlb-ink)]">
        <img src="assets/icons/nav-home.svg" alt="" class="w-5 h-5">
        <span class="font-semibold">Home</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <img src="assets/icons/nav-scores.svg" alt="" class="w-5 h-5">
        <span>Scores</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <img src="assets/icons/nav-watch.svg" alt="" class="w-5 h-5">
        <span>Watch</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <img src="assets/icons/nav-standings.svg" alt="" class="w-5 h-5">
        <span>Standings</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <img src="assets/icons/nav-news.svg" alt="" class="w-5 h-5">
        <span>News</span>
      </div>
    </nav>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
